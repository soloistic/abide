name: Production database migrations

on:
  push:
    branches:
      - main
    paths:
      - "prisma/migrations/**"
      - "prisma/schema.prisma"
      - "prisma.config.ts"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/production-migrations.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-database-migrations
  cancel-in-progress: false

jobs:
  migrate:
    name: Apply migrations
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install migration tooling
        run: npm ci --ignore-scripts

      - name: Validate production database secret
        shell: bash
        run: |
          if [[ -z "$DATABASE_URL" ]]; then
            echo "::error::Configure DATABASE_URL in the GitHub production environment."
            exit 1
          fi

      - name: Apply pending Prisma migrations
        run: npm run db:deploy
