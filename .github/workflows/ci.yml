name: Pull request checks

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, test, typecheck, and build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Prisma generation requires a syntactically valid URL. Database-backed
      # pages are request-rendered, so the build does not connect to this host.
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/abide
      APP_TIME_ZONE: Europe/London
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run unit tests
        run: npm test

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
