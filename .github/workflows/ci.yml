name: Quality checks

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, test, e2e, typecheck, and build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: abide_e2e
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # Prisma generation requires a syntactically valid URL. Database-backed
      # pages are request-rendered, so the build does not connect to this host.
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/abide
      E2E_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/abide_e2e
      APP_TIME_ZONE: Europe/London
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run unit tests
        run: npm test

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run route-level tests
        run: npm run test:e2e

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
